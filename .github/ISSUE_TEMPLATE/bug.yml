name: Bug
description: Report a defect in the account console.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Include logs, fixture refs, checksums, screenshots or failing commands.
    validations:
      required: true
  - type: dropdown
    id: layer
    attributes:
      label: Suspected layer
      options:
        - contracts
        - rust-hotpath
        - python-backend
        - typescript-frontend
        - docs-acceptance
        - unknown
    validations:
      required: true

